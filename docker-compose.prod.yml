name: mpwik-lublin

services:
  mpwik-db:
    image: postgis/postgis:16-3.4-alpine
    container_name: mpwik-lublin-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mpwik_lublin}
      POSTGRES_USER: ${POSTGRES_USER:-mpwik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"   # tylko loopback — dostępne wyłącznie przez tunel SSH
    volumes:
      - mpwik_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mpwik} -d ${POSTGRES_DB:-mpwik_lublin}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mpwik-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_TURNSTILE_SITE_KEY=${VITE_TURNSTILE_SITE_KEY:-1x00000000000000000000AA}
    container_name: mpwik-lublin-frontend
    ports:
      - "80:80"
    depends_on:
      - mpwik-backend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mpwik-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mpwik-lublin-backend
    # Port 8000 dostępny tylko wewnątrz sieci Docker (Nginx proxuje /api)
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-mpwik}:${POSTGRES_PASSWORD}@mpwik-db:5432/${POSTGRES_DB:-mpwik_lublin}
      - POSTGRES_HOST=mpwik-db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-mpwik}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-mpwik_lublin}
      - DEBUG=false
    depends_on:
      mpwik-db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  scripts:
    build:
      context: ./backend
      dockerfile: Dockerfile.scripts
    container_name: mpwik-lublin-scripts
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-mpwik}:${POSTGRES_PASSWORD}@mpwik-db:5432/${POSTGRES_DB:-mpwik_lublin}
      - POSTGRES_HOST=mpwik-db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-mpwik}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-mpwik_lublin}
    depends_on:
      mpwik-db:
        condition: service_healthy
    profiles:
      - scripts

volumes:
  mpwik_db_data:
    driver: local
