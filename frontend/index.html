<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>System Powiadomień MPWiK Lublin</title>
    <meta name="description" content="System powiadamiania mieszkańców Lublina o awariach i przerwach w dostawie wody." />
    <meta name="author" content="MPWiK Lublin" />

    <meta property="og:title" content="System Powiadomień MPWiK Lublin" />
    <meta property="og:description" content="System powiadamiania mieszkańców Lublina o awariach i przerwach w dostawie wody." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@MPWiKLublin" />
  <script>
    (function(){
      try {
        var f = localStorage.getItem('mpwik-a11y-font-size');
        var c = localStorage.getItem('mpwik-a11y-contrast');
        if (f === 'large') document.documentElement.style.fontSize = '18px';
        else if (f === 'xlarge') document.documentElement.style.fontSize = '20px';
        if (c && c !== 'default') document.documentElement.setAttribute('data-theme', c);
      } catch(e) {}
    })();
  </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
