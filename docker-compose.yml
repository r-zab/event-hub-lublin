name: mpwik-lublin

services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: mpwik-lublin-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mpwik_lublin}
      POSTGRES_USER: ${POSTGRES_USER:-mpwik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
     
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mpwik} -d ${POSTGRES_DB:-mpwik_lublin}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mpwik-lublin-backend
    image: mpwik-lublin-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/code/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # DATABASE_URL uses 'db' as host — overrides any value from env_file
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-mpwik}:${POSTGRES_PASSWORD:-devpassword}@db:5432/${POSTGRES_DB:-mpwik_lublin}
      # POSTGRES_* exposed so entrypoint.sh wait-loop can connect via psycopg2
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-mpwik}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-devpassword}
      - POSTGRES_DB=${POSTGRES_DB:-mpwik_lublin}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  scripts:
    build:
      context: ./backend
      dockerfile: Dockerfile.scripts
    container_name: mpwik-lublin-scripts
    volumes:
      - ./backend:/code
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-mpwik}:${POSTGRES_PASSWORD:-devpassword}@db:5432/${POSTGRES_DB:-mpwik_lublin}
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - scripts

volumes:
  db_data:
    driver: local